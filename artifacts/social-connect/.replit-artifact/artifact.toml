kind = "web"
previewPath = "/"
title = "SocialConnect"
version = "1.0.0"
id = "artifacts/social-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21801

[services.development]
run = "pnpm --filter @workspace/social-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-connect", "run", "build" ]
publicDir = "artifacts/social-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21801"
BASE_PATH = "/"
